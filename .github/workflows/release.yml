name: Release collections

# Cut a release by pushing a semver tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write          # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Validate (gate the release)
        run: python3 scripts/validate_collections.py --strict

      - name: Check index hashes are current (gate the release)
        run: python3 scripts/compute_hashes.py --check

      - name: Build dist + manifest
        env:
          TAG: ${{ github.ref_name }}        # e.g. v1.0.0
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          # Stamp the release version (from the tag — the single source of truth)
          # into the index. Done in the working copy *before* the copy/zip/manifest
          # steps so the published dist/collections.json, the zip, and the manifest's
          # indexHash (build_manifest.py hashes ./collections.json) all agree. The
          # workflow checkout is ephemeral, so this is not committed back.
          python3 - "$VER" <<'PY'
          import json, sys
          with open("collections.json", encoding="utf-8") as f:
              index = json.load(f)
          index["version"] = sys.argv[1]
          with open("collections.json", "w", encoding="utf-8") as f:
              json.dump(index, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY
          # Regenerate the standalone dynamic feeds from the released data so the
          # published copies always reflect this version (the data is the source of
          # truth). build_manifest.py hashes these from the working copy, so this
          # must run before it.
          python3 scripts/build_recently_added.py
          python3 scripts/build_on_this_day.py
          python3 scripts/build_newsletter_picks.py
          mkdir -p dist/collections
          cp collections.json dist/
          cp collections/*.json dist/collections/
          cp recently-added.json on-this-day.json newsletter-picks.json dist/
          ( cd dist && zip -qr "quips-collections-${TAG}.zip" collections.json collections \
              recently-added.json on-this-day.json newsletter-picks.json )
          python3 scripts/build_manifest.py "$VER" > dist/manifest.json
          echo "Manifest:"; cat dist/manifest.json

      - name: Extract release notes from CHANGELOG
        env:
          TAG: ${{ github.ref_name }}        # e.g. v1.1.0
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          # Pull the "## [VER] - date" section out of CHANGELOG.md, up to the next
          # version heading, and use it as the release body.
          awk -v ver="$VER" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md | sed '/./,$!d' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${TAG}" > RELEASE_NOTES.md
          fi
          echo "--- release notes ---"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/quips-collections-*.zip
            dist/manifest.json
            dist/collections.json

      - name: Push to R2 (data.quipsapp.com)
        env:
          TAG: ${{ github.ref_name }}
          ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BUCKET: ${{ secrets.R2_BUCKET }}
          # R2 uses S3-compatible creds; the aws CLI is preinstalled on the
          # runner, so configure it via env (no STS / configure-aws-credentials).
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REGION: auto
          # AWS CLI v2.23+ sends integrity checksums R2 rejects; only send when required.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          # Versioned objects are immutable -> cache forever.
          aws s3 sync dist/ "s3://${BUCKET}/v${VER}/" \
            --endpoint-url "$ENDPOINT" \
            --exclude manifest.json \
            --cache-control "public, max-age=31536000, immutable"
          # The single mutable pointer -> short TTL.
          aws s3 cp dist/manifest.json "s3://${BUCKET}/latest/manifest.json" \
            --endpoint-url "$ENDPOINT" \
            --cache-control "public, max-age=300"
