name: Validate collections

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      # Validator is stdlib-only; no dependencies to install.
      - name: Validate collections data
        run: python3 scripts/validate_collections.py --strict
      # Per-collection contentHash/bytes in the index must match the files on
      # disk, or progressive-download clients fetch the wrong deltas.
      - name: Check index hashes are current
        run: python3 scripts/compute_hashes.py --check
